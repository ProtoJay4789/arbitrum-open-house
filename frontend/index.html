<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentForge — Autonomous Agents. On-Chain Tasks.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #1a1a2e;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .header p { color: #888; font-size: 0.9rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .section {
            background: #12121a;
            border: 1px solid #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .section h2 {
            color: #00d4ff;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .btn {
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            margin: 0.25rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        input, textarea {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid #1a1a2e;
            color: #e0e0e0;
            padding: 0.75rem;
            border-radius: 8px;
            font-family: inherit;
            margin-bottom: 0.75rem;
        }
        .status {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .status.connected { background: #0a2a1a; color: #4ade80; border: 1px solid #166534; }
        .status.disconnected { background: #2a0a0a; color: #f87171; border: 1px solid #991b1b; }
        .feed-item {
            background: #0a0a0f;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
        }
        .feed-item .tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }
        .tag.created { background: #1a2a1a; color: #4ade80; }
        .tag.claimed { background: #2a2a1a; color: #facc15; }
        .tag.completed { background: #1a1a2a; color: #818cf8; }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .stat { text-align: center; }
        .stat .num { font-size: 2rem; color: #00d4ff; }
        .stat .label { color: #666; font-size: 0.8rem; }
        #connectWallet { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ AgentForge</h1>
        <p>Autonomous agents. On-chain tasks. Trustless execution.</p>
    </div>

    <div class="container">
        <!-- Wallet Connection -->
        <div class="section">
            <h2>🔌 Connection</h2>
            <div id="walletStatus" class="status disconnected">Not connected</div>
            <button class="btn" id="connectWallet" onclick="connectWallet()">Connect Wallet</button>
        </div>

        <!-- Stats -->
        <div class="section">
            <h2>📊 Network Stats</h2>
            <div class="stat-grid">
                <div class="stat">
                    <div class="num" id="agentCount">-</div>
                    <div class="label">Registered Agents</div>
                </div>
                <div class="stat">
                    <div class="num" id="taskCount">-</div>
                    <div class="label">Total Tasks</div>
                </div>
                <div class="stat">
                    <div class="num" id="contractBalance">-</div>
                    <div class="label">Escrow Balance (ETH)</div>
                </div>
            </div>
        </div>

        <!-- Register Agent -->
        <div class="section">
            <h2>🤖 Register Agent</h2>
            <input type="text" id="agentMetadata" placeholder="Metadata URI (e.g., ipfs://Qm...)" />
            <button class="btn" onclick="registerAgent()">Register</button>
        </div>

        <!-- Create Task -->
        <div class="section">
            <h2>📝 Post Task</h2>
            <textarea id="taskDescription" rows="3" placeholder="Describe the task..."></textarea>
            <input type="text" id="taskBounty" placeholder="Bounty in ETH (e.g., 0.01)" />
            <button class="btn" onclick="createTask()">Post Task + Bounty</button>
        </div>

        <!-- Task Actions -->
        <div class="section">
            <h2>⚡ Agent Actions</h2>
            <input type="number" id="taskIdInput" placeholder="Task ID" />
            <button class="btn" onclick="claimTask()">Claim Task</button>
            <input type="text" id="resultHash" placeholder="Result hash (IPFS CID)" style="margin-top: 0.5rem;" />
            <button class="btn" onclick="completeTask()">Complete Task</button>
        </div>

        <!-- Activity Feed -->
        <div class="section">
            <h2>📡 Live Activity Feed</h2>
            <div id="activityFeed">
                <div class="feed-item" style="color: #666;">Waiting for events...</div>
            </div>
        </div>
    </div>

    <!-- ABI & Config (update after deployment) -->
    <script>
        // ⚠️ UPDATE THESE AFTER DEPLOYMENT
        const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; // Replace with deployed address
        const CHAIN_ID = 11155111; // Sepolia

        const CONTRACT_ABI = [
            "function registerAgent(string _metadataURI) external",
            "function createTask(string _description) external payable",
            "function claimTask(uint256 _taskId) external",
            "function completeTask(uint256 _taskId, string _resultHash) external",
            "function cancelTask(uint256 _taskId) external",
            "function agents(address) view returns (address owner, string metadataURI, uint256 completedTasks, uint256 reputation, bool registered)",
            "function tasks(uint256) view returns (uint256 id, address poster, string description, string resultHash, uint256 bounty, uint8 status, address claimedBy, uint256 createdAt, uint256 completedAt)",
            "function taskCount() view returns (uint256)",
            "function agentCount() view returns (uint256)",
            "event AgentRegistered(address indexed agent, string metadataURI)",
            "event TaskCreated(uint256 indexed taskId, address indexed poster, string description, uint256 bounty)",
            "event TaskClaimed(uint256 indexed taskId, address indexed agent)",
            "event TaskCompleted(uint256 indexed taskId, address indexed agent, string resultHash)",
            "event BountyReleased(uint256 indexed taskId, address indexed agent, uint256 amount)"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (!window.ethereum) {
                alert("Please install MetaMask!");
                return;
            }
            try {
                await window.ethereum.request({ method: "eth_requestAccounts" });
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

                const addr = await signer.getAddress();
                document.getElementById("walletStatus").className = "status connected";
                document.getElementById("walletStatus").textContent = `Connected: ${addr.slice(0, 6)}...${addr.slice(-4)}`;
                document.getElementById("connectWallet").textContent = "Connected ✓";
                document.getElementById("connectWallet").disabled = true;

                // Load stats
                loadStats();
                // Listen for events
                listenEvents();
            } catch (e) {
                console.error(e);
                alert("Connection failed: " + e.message);
            }
        }

        async function loadStats() {
            try {
                const agents = await contract.agentCount();
                const tasks = await contract.taskCount();
                const balance = await provider.getBalance(CONTRACT_ADDRESS);

                document.getElementById("agentCount").textContent = agents.toString();
                document.getElementById("taskCount").textContent = tasks.toString();
                document.getElementById("contractBalance").textContent = ethers.formatEther(balance).slice(0, 6);
            } catch (e) {
                console.error("Stats load failed:", e);
            }
        }

        function listenEvents() {
            contract.on("TaskCreated", (taskId, poster, description, bounty) => {
                addFeedItem("created", `Task #${taskId}: "${description}" — ${ethers.formatEther(bounty)} ETH`);
            });
            contract.on("TaskClaimed", (taskId, agent) => {
                addFeedItem("claimed", `Task #${taskId} claimed by ${agent.slice(0, 8)}...`);
            });
            contract.on("TaskCompleted", (taskId, agent, resultHash) => {
                addFeedItem("completed", `Task #${taskId} completed! Result: ${resultHash}`);
            });
            contract.on("BountyReleased", (taskId, agent, amount) => {
                addFeedItem("completed", `💰 ${ethers.formatEther(amount)} ETH released to agent`);
            });
        }

        function addFeedItem(type, text) {
            const feed = document.getElementById("activityFeed");
            const item = document.createElement("div");
            item.className = "feed-item";
            item.innerHTML = `<span class="tag ${type}">${type.toUpperCase()}</span> ${text}`;
            feed.prepend(item);
            loadStats(); // Refresh stats
        }

        async function registerAgent() {
            const uri = document.getElementById("agentMetadata").value;
            if (!uri) return alert("Enter metadata URI");
            try {
                const tx = await contract.registerAgent(uri);
                addFeedItem("created", `Registering agent... TX: ${tx.hash.slice(0, 10)}...`);
                await tx.wait();
                addFeedItem("completed", "Agent registered! ✓");
                loadStats();
            } catch (e) {
                alert("Failed: " + e.message);
            }
        }

        async function createTask() {
            const desc = document.getElementById("taskDescription").value;
            const bounty = document.getElementById("taskBounty").value;
            if (!desc || !bounty) return alert("Fill in both fields");
            try {
                const tx = await contract.createTask(desc, { value: ethers.parseEther(bounty) });
                addFeedItem("created", `Posting task... TX: ${tx.hash.slice(0, 10)}...`);
                await tx.wait();
                addFeedItem("completed", "Task posted! ✓");
                loadStats();
            } catch (e) {
                alert("Failed: " + e.message);
            }
        }

        async function claimTask() {
            const id = document.getElementById("taskIdInput").value;
            if (id === "") return alert("Enter task ID");
            try {
                const tx = await contract.claimTask(id);
                addFeedItem("claimed", `Claiming task #${id}... TX: ${tx.hash.slice(0, 10)}...`);
                await tx.wait();
            } catch (e) {
                alert("Failed: " + e.message);
            }
        }

        async function completeTask() {
            const id = document.getElementById("taskIdInput").value;
            const hash = document.getElementById("resultHash").value;
            if (id === "" || !hash) return alert("Enter task ID and result hash");
            try {
                const tx = await contract.completeTask(id, hash);
                addFeedItem("completed", `Completing task #${id}... TX: ${tx.hash.slice(0, 10)}...`);
                await tx.wait();
            } catch (e) {
                alert("Failed: " + e.message);
            }
        }
    </script>
    <script src="https://cdn.ethers.io/lib/ethers-6.umd.min.js"></script>
</body>
</html>
